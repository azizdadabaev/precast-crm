name: precast-crm

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-precast}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-precast}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-precast} -d ${POSTGRES_DB:-precast}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./precast-crm
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-precast}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-precast}?schema=public
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:?set NEXT_PUBLIC_APP_URL in .env}
      ORDER_CANCEL_PASSWORD: ${ORDER_CANCEL_PASSWORD:?set ORDER_CANCEL_PASSWORD in .env}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      NODE_ENV: production
    volumes:
      - uploads:/app/public/uploads
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  uploads:
  caddy_data:
  caddy_config:
