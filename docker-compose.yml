name: precast-crm

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-precast}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-precast}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-precast} -d ${POSTGRES_DB:-precast}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./precast-crm
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-precast}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-precast}?schema=public
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:?set NEXT_PUBLIC_APP_URL in .env}
      ORDER_CANCEL_PASSWORD: ${ORDER_CANCEL_PASSWORD:?set ORDER_CANCEL_PASSWORD in .env}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      NODE_ENV: production
      DRAWINGS_DIR: /data/drawings
      # The orders capacity calendar buckets rows by Date#getDate() in
      # the server's local timezone, and the day-filter on the orders
      # list computes its window the same way. Without TZ set, the
      # container defaults to UTC and an operator in Tashkent picking
      # "May 29" on the calendar would see "No orders" for a row whose
      # scheduledAt is between 19:00 May 28 UTC and midnight, even
      # though that row paints the May 29 cell. Pinning to
      # Asia/Tashkent (no DST, fixed +05) keeps both views in sync
      # with what the operator sees.
      TZ: ${TZ:-Asia/Tashkent}
    volumes:
      - uploads:/app/public/uploads
      - drawings_data:/data
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512m

  # Blender Bridge — owner-only WebSocket service that forwards
  # DrawingRequest rows from Postgres to a locally-running Blender
  # via wss://<host>/ws (Caddy proxies that path here). The internal
  # HTTP port 8766 is reachable only over the compose network and
  # exposes /flush + /status for the Next.js app to consult.
  ws-bridge:
    build:
      context: ./ws-bridge
      dockerfile: Dockerfile
    container_name: etalon-ws-bridge
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-precast}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-precast}?schema=public
      WS_BRIDGE_PORT: "8765"
      WS_BRIDGE_HTTP_PORT: "8766"
      BRIDGE_SECRET: ${BRIDGE_SECRET:?set BRIDGE_SECRET in .env (use openssl rand -hex 32)}
      DRAWINGS_DIR: /data/drawings
    volumes:
      - drawings_data:/data
    expose:
      # Both ports stay inside the compose network. Caddy proxies the
      # public 8765 WebSocket port via the /ws path. 8766 is internal-
      # only — no Caddy route — so the unauthenticated /flush + /status
      # endpoints are never reachable from the public internet.
      - "8765"
      - "8766"
    deploy:
      resources:
        limits:
          memory: 128m

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
      - ws-bridge
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - uploads:/srv/uploads:ro

volumes:
  pgdata:
  uploads:
  drawings_data:
  caddy_data:
  caddy_config:
